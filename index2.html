<!-- 3. Copy this JavaScript -->
<script>
  document.getElementById('crmContactForm').addEventListener('submit', function (e) {
    e.preventDefault();
    // --- CONFIGURATION ---
    const CRM_URL = 'http://crm_project.test'; // REPLACE THIS with your actual CRM URL
    // ---------------------
    const form = this;
    const btn = document.getElementById('crmSubmitBtn');
    const alert = document.getElementById('crm-alert');
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = 'Sending...';
    alert.style.display = 'none';
    const formData = new FormData(form);
    fetch(CRM_URL + '/public/lead', {
      method: 'POST',
      body: formData,
      headers: {
        'X-Requested-With': 'XMLHttpRequest'
      }
    })
      .then(response => response.json())
      .then(data => {
        if (data.status === 'success') {
          form.reset();
          alert.className = 'crm-success';
          alert.innerHTML = '✅ ' + data.message;
          alert.style.display = 'block';
        } else {
          let msg = 'Error: ';
          if (typeof data.errors === 'object') {
            msg += Object.values(data.errors).join(', ');
          } else {
            msg += 'Check your inputs.';
          }
          alert.className = 'crm-error';
          alert.innerHTML = '❌ ' + msg;
          alert.style.display = 'block';
        }
      })
      .catch(error => {
        console.error('Error:', error);
        alert.className = 'crm-error';
        alert.innerHTML = '❌ An error occurred. Please try again.';
        alert.style.display = 'block';
      })
      .finally(() => {
        btn.disabled = false;
        btn.innerHTML = originalText;
      });
  });
</script>
